<!doctype html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .auth { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border: 1px solid var(--ds-color-border); background: color-mix(in oklch, var(--ds-color-surface-muted) 60%, transparent); border-radius: var(--ds-radius-sm); font-size: 11.5px; font-weight: 500; color: var(--ds-color-text-secondary); }
  .auth-icon { display: inline-flex; gap: 4px; align-items: center; font-size: 11px; color: var(--ds-color-text-muted); }
  .behoerde { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border: 1px solid var(--ds-color-border); border-radius: var(--ds-radius-full); font-size: 12px; color: var(--ds-color-text-secondary); }
  .pilot { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--ds-radius-full); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; background: color-mix(in oklch, var(--ds-color-info-soft) 100%, transparent); color: var(--ds-color-accent); box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--ds-color-accent) 30%, transparent); }
  .eudi { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: var(--ds-radius-sm); font-size: 11.5px; font-weight: 500; color: var(--ds-color-success); background: color-mix(in oklch, var(--ds-color-success) 10%, transparent); box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--ds-color-success) 30%, transparent); }
</style></head>
<body>
  <div class="row">
    <span class="auth">✉ Empfangen über Briefpost</span>
    <span class="eudi">🛡 EUDI-versiegelt</span>
    <span class="auth-icon">📥 Brief</span>
  </div>
  <div class="row">
    <span class="behoerde">⌂ Bundesbehörde</span>
    <span class="behoerde">⌂ Landesbehörde</span>
    <span class="behoerde">⌂ Kommunale Behörde</span>
  </div>
  <div class="row">
    <span class="pilot">ℹ Datenschutzcockpit · Pilot-Phase</span>
  </div>
  <p class="ds-caption" style="margin: 4px 0 0; font-size: 12px;">Behörden­kategorien sind <em>nur</em> textlich differenziert (HL-DS-10). Keine Farb-Codierung für Bund / Land / Kommune.</p>
</body></html>
