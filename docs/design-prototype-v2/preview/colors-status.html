<!doctype html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
    <div class="swatch"><div class="chip" style="background: var(--ds-color-warning);"></div><span class="lbl">warning</span><span class="meta">Hue 80 · L 55%</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-warning-soft);"></div><span class="lbl">warning-soft</span><span class="meta">Hue 90 · L 97%</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-danger);"></div><span class="lbl">danger</span><span class="meta">Hue 27 · L 48%</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-success);"></div><span class="lbl">success</span><span class="meta">Hue 152 · L 45%</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-info-soft);"></div><span class="lbl">info-soft</span><span class="meta">Hue 245 · L 94%</span></div>
  </div>
  <p class="ds-caption" style="margin: 4px 0 0; font-size: 12px;">Exactly three status families plus one Föderalismus info-soft (HL-DS-3, HL-DS-14). Danger reserved for true errors only.</p>
</body></html>
