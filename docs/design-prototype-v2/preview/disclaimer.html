<!doctype html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .banner { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: var(--ds-color-warning-soft); color: #4a2e00; border-block: 1px solid color-mix(in oklch, var(--ds-color-warning) 35%, transparent); border-radius: var(--ds-radius-md); }
  .banner svg { flex-shrink: 0; margin-top: 2px; stroke: currentColor; stroke-width: 2; fill: none; }
  .info { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: var(--ds-color-info-soft); color: var(--ds-color-accent); border-radius: var(--ds-radius-md); box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--ds-color-accent) 18%, transparent); }
  .info svg { flex-shrink: 0; margin-top: 2px; stroke: currentColor; stroke-width: 2; fill: none; }
</style></head>
<body>
  <div class="banner">
    <svg width="20" height="20" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L22 20 H2 Z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17.2" r="0.6" fill="currentColor"/></svg>
    <div>
      <strong style="font-weight: 600;">Speculative Prototype</strong> — Keine echte Behörde ist angebunden. Alle Daten sind synthetisch und tragen den Watermark <span class="ds-tabular" style="background: rgba(0,0,0,.05); padding: 1px 6px; border-radius: 3px;">[MOCK]</span>.
    </div>
  </div>
  <div class="info">
    <svg width="20" height="20" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16.5"/><circle cx="12" cy="8" r="0.6" fill="currentColor"/></svg>
    <div><strong style="font-weight: 600;">Föderalismus-Hinweis</strong> — Familienkasse Brandenburg ist seit 04/2026 angebunden. ABH Köln noch nicht angebunden — Brief wird postalisch zugestellt.</div>
  </div>
</body></html>
