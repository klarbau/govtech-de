<!doctype html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
    <div class="swatch"><div class="chip" style="background: var(--ds-color-surface);"></div><span class="lbl">surface</span><span class="meta">100% L · C 0</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-surface-raised);"></div><span class="lbl">surface-raised</span><span class="meta">98% · C 0.002</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-surface-muted);"></div><span class="lbl">surface-muted</span><span class="meta">95% · C 0.003</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-border);"></div><span class="lbl">border</span><span class="meta">86% · C 0.004</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-border-strong);"></div><span class="lbl">border-strong</span><span class="meta">65% · C 0.005</span></div>
  </div>
  <p class="ds-caption" style="margin: 4px 0 0; font-size: 12px;">Hue 80°, chroma cap ≤ 0.005 (HL-DS-3). Warmth perceivable only side-by-side — never as brand statement.</p>
</body></html>
