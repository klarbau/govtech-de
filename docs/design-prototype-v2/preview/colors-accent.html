<!doctype html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;">
    <div class="swatch"><div class="chip" style="background: var(--ds-color-accent);"></div><span class="lbl">accent</span><span class="meta">Hue 252 · L 40%</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-accent-soft);"></div><span class="lbl">accent-soft</span><span class="meta">Hue 252 · L 95%</span></div>
    <div class="swatch"><div class="chip" style="background: var(--ds-color-accent-foreground); border-color: var(--ds-color-border-strong);"></div><span class="lbl">accent-foreground</span><span class="meta">White · contrast paired</span></div>
  </div>
  <div style="display: flex; gap: 10px; align-items: center; margin-top: 4px;">
    <button style="height: 40px; padding: 0 14px; border-radius: var(--ds-radius-md); border: none; background: var(--ds-color-accent); color: var(--ds-color-accent-foreground); font-family: inherit; font-weight: 500; font-size: 14px; cursor: pointer;">Vorgang starten</button>
    <span style="font-size: 13px; padding: 4px 10px; background: var(--ds-color-accent-soft); color: var(--ds-color-accent); border-radius: var(--ds-radius-full); font-weight: 500;">aktive Sektion</span>
    <a href="#" style="color: var(--ds-color-accent); font-size: 14px; text-decoration: underline; text-underline-offset: 3px;">Mehr anzeigen</a>
  </div>
</body></html>
