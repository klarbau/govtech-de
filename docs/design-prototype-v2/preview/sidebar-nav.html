<!doctype html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .nav { width: 240px; background: var(--ds-color-surface-raised); border: 1px solid var(--ds-color-border); border-radius: var(--ds-radius-lg); padding: 6px; display: flex; flex-direction: column; gap: 2px; }
  .item { min-height: 44px; display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--ds-radius-md); border-inline-start: 4px solid transparent; color: var(--ds-color-text-secondary); font-size: 14px; font-weight: 500; cursor: pointer; }
  .item .ic { color: var(--ds-color-text-muted); display: inline-flex; }
  .item.active { background: var(--ds-color-accent-soft); border-inline-start-color: var(--ds-color-accent); color: var(--ds-color-text-primary); font-weight: 600; }
  .item.active .ic { color: var(--ds-color-accent); }
  .item.hover { background: var(--ds-color-surface-muted); color: var(--ds-color-text-primary); }
  .item.focus { outline: 2px solid var(--ds-color-accent); outline-offset: -2px; }
  .col { display: flex; flex-direction: column; gap: 4px; }
  .col span { font-size: 11px; color: var(--ds-color-text-muted); letter-spacing: 0.04em; text-transform: uppercase; padding-left: 4px; }
</style></head>
<body>
  <div style="display: flex; gap: 18px;">
    <div class="col"><span>Default</span><div class="nav">
      <div class="item"><span class="ic">▣</span>Dashboard</div>
      <div class="item"><span class="ic">✉</span>Posteingang</div>
      <div class="item"><span class="ic">⌂</span>Stammdaten</div>
    </div></div>
    <div class="col"><span>Active + Hover</span><div class="nav">
      <div class="item active"><span class="ic">▣</span>Dashboard</div>
      <div class="item hover"><span class="ic">✉</span>Posteingang</div>
      <div class="item"><span class="ic">⌂</span>Stammdaten</div>
    </div></div>
    <div class="col"><span>Focus</span><div class="nav">
      <div class="item"><span class="ic">▣</span>Dashboard</div>
      <div class="item focus"><span class="ic">✉</span>Posteingang</div>
      <div class="item"><span class="ic">⌂</span>Stammdaten</div>
    </div></div>
  </div>
  <p class="ds-caption" style="margin: 4px 0 0; font-size: 12px;">44-px min-height (HL-DS-8). Active = 4-px <code>border-s</code> in Trust-Blau + accent-soft fill. Icons are Lucide; placeholder glyphs shown.</p>
</body></html>
