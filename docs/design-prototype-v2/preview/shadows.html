<!doctype html>
<html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body style="background: var(--ds-color-surface-muted);">
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 8px 4px;">
    <div style="display: flex; flex-direction: column; gap: 8px; align-items: stretch;">
      <div style="height: 72px; background: var(--ds-color-surface); border: 1px solid var(--ds-color-border); border-radius: var(--ds-radius-lg); box-shadow: var(--ds-shadow-card);"></div>
      <span class="lbl">shadow-card</span>
      <span class="meta">1 + 3 px · 4–6 % opacity</span>
    </div>
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; background: var(--ds-color-surface); border: 1px solid var(--ds-color-border); border-radius: var(--ds-radius-lg); box-shadow: var(--ds-shadow-popover);"></div>
      <span class="lbl">shadow-popover</span>
      <span class="meta">8 + 16 px · 6–8 % opacity</span>
    </div>
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; background: var(--ds-color-surface); border: 1px solid var(--ds-color-border); border-radius: var(--ds-radius-lg); box-shadow: var(--ds-shadow-modal);"></div>
      <span class="lbl">shadow-modal</span>
      <span class="meta">24 + 48 px · 10–14 % opacity</span>
    </div>
  </div>
  <p class="ds-caption" style="margin: 0 4px; font-size: 12px;">Exactly three tokens (HL-DS-2). Border-first, shadow second — default cards layer with a 1-px hairline, not a shadow.</p>
</body></html>
