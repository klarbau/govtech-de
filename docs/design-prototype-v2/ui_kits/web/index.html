        title="Ein Umzug, eine Zustimmung pro Behörde."
        lede="Bürgeramt, KBA, Finanzamt, Krankenkasse, Familienkasse — wir bereiten alles vor, Sie entscheiden pro Behörde."
      />

      <GtWizardProgress step={step} />

      {step === 1 && (
        <section className="stack-lg" style={{ maxWidth: 640 }}>
          <div>
            <GtSectionMark num="01" label="Neue Adresse & Stichtag" />
            <div className="stack-md">
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 2fr", gap: 16 }}>
                <GtInput label="Straße & Hausnummer" value={adresse.strasse} onChange={(e) => setAdresse({ ...adresse, strasse: e.target.value })} placeholder="Hauptstr. 14" />
                <GtInput label="PLZ" tabular value={adresse.plz} onChange={(e) => setAdresse({ ...adresse, plz: e.target.value })} placeholder="12435" />
                <GtInput label="Ort" value={adresse.ort} onChange={(e) => setAdresse({ ...adresse, ort: e.target.value })} placeholder="Berlin" />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1.4fr", gap: 16, alignItems: "end" }}>
                <GtInput label="Einzugsdatum" type="date" value={stichtag} onChange={(e) => setStichtag(e.target.value)} />
                <span style={{ fontSize: 12, color: "var(--ds-color-text-muted)", lineHeight: 1.5, paddingBottom: 12 }}>
                  Meldegesetz · zwei Wochen nach Einzug · <span className="norm-cite">§ 17 BMG</span>
                </span>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 24 }}>
            <GtButton variant="ghost">Verwerfen</GtButton>
            <GtButton variant="accent" disabled={!adresse.strasse || !adresse.plz || !stichtag} onClick={() => setStep(2)}>
              Vorschau anzeigen<GtArrowRight size={14}/>
            </GtButton>
          </div>
        </section>
      )}

      {step === 2 && (
        <React.Fragment>
          <header style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 24 }}>
            <div>
              <span className="eyebrow">{persona.name} · Stichtag {stichtag.split("-").reverse().join(".") || "—"}</span>
              <h2 style={{ margin: "8px 0 0", fontSize: 22, fontWeight: 600, letterSpacing: "-0.01em" }}>
                {adresse.strasse}, {adresse.plz} {adresse.ort}
              </h2>
            </div>
            <GtButton variant="link" onClick={() => setStep(1)}>
              <GtArrowLeft size={13}/>Adresse ändern
            </GtButton>
          </header>

          <div className="foederalismus">
            <GtInfo size={16} style={{ flexShrink: 0, marginTop: 2 }} />
            <div>
              <strong>Föderalismus-Hinweis · </strong>
              Bürgeramt Tempelhof-Schöneberg und Finanzamt FH-Kreuzberg sind seit 01/2026 BundID-angebunden. KBA Flensburg seit 04/2026.
            </div>
          </div>

          {window.GtData.UMZUG_CASCADE.blocks.map((b, idx) => (
            <article key={b.id} className="cascade-block">
              <header className="cascade-block-head">
                <h3><span className="blk-num">0{idx + 1}</span>{b.title.replace(/^Block [A-C] · /, "")}</h3>
                <span className="timing">{b.timing}</span>
              </header>
              {b.behoerden.map((bb, i) => (
                <div key={i} className="behoerde-row">
                  <div className="name-col">
                    <span className="name">{bb.name}</span>
                    <span className="task">{bb.task}</span>
                    <span className="kategorie">{bb.category}</span>
                  </div>
                  <input type="checkbox" defaultChecked className="toggle" aria-label={`${bb.name} zustimmen`} />
                </div>
              ))}
            </article>
          ))}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginTop: 32, gap: 24 }}>
            <p style={{ fontSize: 12.5, color: "var(--ds-color-text-muted)", maxWidth: "44ch", lineHeight: 1.55, margin: 0 }}>
              Sie können Behörden einzeln abwählen. Block 03 startet erst nach Bestätigung von 01 + 02.
            </p>
            <GtButton variant="accent" onClick={() => { setStep(3); setRunning(true); setProgressBlock(0); }}>
              Autopilot starten<GtArrowRight size={14}/>
            </GtButton>
          </div>
        </React.Fragment>
      )}

      {step === 3 && (
        <React.Fragment>
          <header style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 24, alignItems: "end", paddingBottom: 32, borderBottom: "1px solid var(--ds-color-border)", marginBottom: 40 }}>
            <div>
              <span className="eyebrow eyebrow-accent">Autopilot läuft</span>
              <h2 style={{ margin: "8px 0 6px", fontSize: 28, fontWeight: 600, letterSpacing: "-0.015em" }}>
                Sie können den Tab schließen.
              </h2>
              <p style={{ margin: 0, fontSize: 14, color: "var(--ds-color-text-secondary)", lineHeight: 1.5, maxWidth: "48ch" }}>
                Wir benachrichtigen Sie pro Behörde im Posteingang. Eingangsbestätigungen erscheinen mit echter Frist + Aktenzeichen.
              </p>
            </div>
            <div className="ds-jumbo" style={{ fontVariantNumeric: "tabular-nums", color: "var(--ds-color-accent)", fontSize: "4rem" }}>
              {progressBlock}/<span style={{ color: "var(--ds-color-text-muted)" }}>{window.GtData.UMZUG_CASCADE.blocks.length}</span>
            </div>
          </header>

          {window.GtData.UMZUG_CASCADE.blocks.map((b, idx) => {
            const isDone = idx < progressBlock;
            const isActive = idx === progressBlock && running;
            const statusEl = isDone ? <span className="status done"><GtCheckCircle size={13}/>Erledigt</span>
                            : isActive ? <span className="status active"><GtRefreshCw size={13}/>Synchronisiert</span>
                            : null;
            return (
              <article key={b.id} className="cascade-block" style={{ opacity: (isDone || isActive) ? 1 : 0.5, transition: "opacity var(--ds-duration-medium) var(--ds-ease-in-out-strong)" }}>
                <header className="cascade-block-head">
                  <h3><span className="blk-num">0{idx + 1}</span>{b.title.replace(/^Block [A-C] · /, "")}</h3>
                  {statusEl || <span className="timing">{b.timing}</span>}
                </header>
                {b.behoerden.map((bb, i) => (
                  <div key={i} className="behoerde-row">
                    <div className="name-col">
                      <span className="name">{bb.name}</span>
                      <span className="task">{bb.task}</span>
                    </div>
                    {isDone ? <GtCheckCircle size={18} style={{ color: "var(--ds-color-success)" }}/> : null}
                  </div>
                ))}
              </article>
            );
          })}

          {progressBlock >= window.GtData.UMZUG_CASCADE.blocks.length && (
            <div style={{ marginTop: 40, padding: "20px 24px", background: "color-mix(in oklch, var(--ds-color-success) 8%, var(--ds-color-surface))", borderRadius: 10, border: "1px solid color-mix(in oklch, var(--ds-color-success) 28%, transparent)" }}>
              <span className="eyebrow" style={{ color: "var(--ds-color-success)" }}>Abgeschlossen</span>
              <p style={{ margin: "6px 0 0", fontSize: 15, color: "var(--ds-color-text-primary)", lineHeight: 1.55, maxWidth: "60ch" }}>
                Alle Behörden haben die Adressänderung bestätigt. Eingangs­bestätigungen liegen in Ihrem Posteingang.
              </p>
            </div>
          )}
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

Object.assign(window, { GtUmzugScreen: UmzugScreen });
  </script>

  <script type="text/babel" data-presets="react" data-source="screen-stub.jsx">

  <script type="text/babel" data-presets="react" data-source="app.jsx">
// ─── app.jsx ─────────────────────────────────────────────────────
// App entry — routing state + persona state + theme
function App() {
  const [personaId, setPersonaId] = React.useState(null);
  const [route, setRoute] = React.useState("dashboard");
  const [openLetterId, setOpenLetterId] = React.useState(null);
  const [theme, setTheme] = React.useState(
    () => {
      if (typeof window === "undefined") return "light";
      try {
        const stored = localStorage.getItem("gt-theme");
        if (stored) return stored;
      } catch (_) {}
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
  );

  React.useEffect(() => {
    document.documentElement.classList.toggle("dark", theme === "dark");
    try { localStorage.setItem("gt-theme", theme); } catch (_) {}
  }, [theme]);

  // Persist persona + route in URL for refresh-stable navigation
  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (personaId) params.set("persona", personaId); else params.delete("persona");
    if (route !== "dashboard") params.set("route", route); else params.delete("route");
    if (openLetterId) params.set("letter", openLetterId); else params.delete("letter");
    const qs = params.toString();
    window.history.replaceState(null, "", `${window.location.pathname}${qs ? "?" + qs : ""}`);
  }, [personaId, route, openLetterId]);

  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const p = params.get("persona");
    if (p && window.GtData.PERSONAS.find(x => x.id === p)) setPersonaId(p);
    const r = params.get("route");
    if (r) setRoute(r);
    const lid = params.get("letter");
    if (lid) setOpenLetterId(lid);
  }, []);

  const toggleTheme = () => setTheme((t) => t === "dark" ? "light" : "dark");

  if (!personaId) {
    return <GtLandingScreen onPick={setPersonaId} theme={theme} onToggleTheme={toggleTheme} />;
  }

  const persona = window.GtData.PERSONAS.find((p) => p.id === personaId);
  const letters = window.GtData.LETTERS[personaId] || [];

  // Counters for sidebar nav (badges)
  const counts = {
    posteingang: letters.filter((l) => l.status === "ungelesen").length || undefined,
    vorgaenge: 1,
  };

  const navigate = (key) => {
    setRoute(key);
    setOpenLetterId(null);
  };

  let screen;
  switch (route) {
    case "dashboard":
      screen = <GtDashboardScreen persona={persona} letters={letters} onOpenLetter={(id) => { setRoute("posteingang"); setOpenLetterId(id); }} onOpenUmzug={() => setRoute("vorgaenge")} />;
      break;
    case "posteingang":
      screen = <GtPosteingangScreen persona={persona} letters={letters} openLetterId={openLetterId} onOpenLetter={setOpenLetterId} onClose={() => setOpenLetterId(null)} />;
      break;
    case "stammdaten":
      screen = <GtStammdatenScreen persona={persona} />;
      break;
    case "vorgaenge":
      screen = <GtUmzugScreen persona={persona} />;
      break;
    case "dokumente":
      screen = <GtStubScreen title="Dokumente · QR-verifizierbarer Vault" label="Geplant: EUDI-Wallet-Export" />;
      break;
    case "termine":
      screen = <GtStubScreen title="Termine bei Behörden" label="Geplant: Kalender-Integration" />;
      break;
    case "steuer":
      screen = <GtStubScreen title="Steuererklärung" label="Geplant: Vorausgefüllt aus Stammdaten" />;
      break;
    case "familie":
      screen = <GtStubScreen title="Familie · gemeinsame Vorgänge" label="Geplant: Schmidt-Geburts-Autopilot" />;
      break;
    case "assistent":
      screen = <GtStubScreen title="Assistent · KI mit Tool-Use" label="Forschung läuft — Claude-Haiku-4.5" />;
      break;
    case "datenschutz":
      screen = <GtStubScreen title="Datenschutzcockpit" label="Geplant: Granular consent — wer sieht was" />;
      break;
    default:
      screen = <GtStubScreen title="Unbekannte Seite" label="—" />;
  }

  return (
    <GtAppShell
      active={route}
      onNavigate={navigate}
      persona={persona}
      onSignOut={() => setPersonaId(null)}
      theme={theme}
      onToggleTheme={toggleTheme}
      counts={counts}
    >
      {screen}
    </GtAppShell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
