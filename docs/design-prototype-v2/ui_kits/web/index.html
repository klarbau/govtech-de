/* ============================================================================
   GovTech DE — Design Tokens (colors + type)
   Source-of-truth for the GovTech DE speculative-design prototype.
   Faithfully transcribed from src/app/globals.css in klarbau/govtech-de.
   Hard-Lines HL-DS-1..HL-DS-14 enforced; see README.md § Visual Foundations.
   ========================================================================= */

/* Webfont — Source Sans 3 (SIL-OFL, kommerziell + Demo-frei).
   In production the Next.js app loads it via next/font/google; for design
   artefacts use the Google Fonts CDN below. AR-Locale (RTL) MUST add
   "Noto Sans Arabic" before system-ui — Source Sans 3 has limited Arabic
   glyph coverage (see [lang="ar"] override). */
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap');

:root {
  color-scheme: light dark;

  /* ── Type-Scale (GOV.UK-aligned, 5-px-line-height-rhythm) ─────────────── */
  --ds-text-display: 3rem;     /* 48 px */
  --ds-text-h1:      2.25rem;  /* 36 px */
  --ds-text-h2:      1.5rem;   /* 24 px */
  --ds-text-h3:      1.1875rem;/* 19 px */
  --ds-text-h4:      1rem;     /* 16 px */
  --ds-text-body:    1rem;     /* 16 px */
  --ds-text-body-s:  0.9375rem;/* 15 px */
  --ds-text-small:   0.875rem; /* 14 px */
  --ds-text-tiny:    0.6875rem;/* 11 px */

  --ds-line-display: 1.0417;   /* 50/48 */
  --ds-line-h1:      1.1111;   /* 40/36 */
  --ds-line-h2:      1.25;     /* 30/24 */
  --ds-line-h3:      1.3158;   /* 25/19 */
  --ds-line-body:    1.5;      /* 24/16 */
  --ds-line-small:   1.4286;   /* 20/14 */

  --ds-weight-regular: 400;
  --ds-weight-medium:  500;
  --ds-weight-semi:    600;
  --ds-weight-bold:    700;

  --ds-tracking-tight: -0.01em;
  --ds-tracking-normal: 0;
  --ds-tracking-wide:  0.06em;   /* uppercase eyebrows */

  /* ── Font Families ────────────────────────────────────────────────────── */
  --ds-font-sans:
    'Source Sans 3', ui-sans-serif, system-ui, -apple-system,
    BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --ds-font-mono:
    ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, monospace;

  /* ── Spacing (additive parallel scale — Tailwind 4-pt default untouched) ─ */
  --ds-space-fixed-5:  0.3125rem;  /*  5 px */
  --ds-space-fixed-10: 0.625rem;   /* 10 px */
  --ds-space-fixed-15: 0.9375rem;  /* 15 px */
  --ds-space-fixed-20: 1.25rem;    /* 20 px */
  --ds-space-fixed-25: 1.5625rem;  /* 25 px */
  --ds-space-fixed-30: 1.875rem;   /* 30 px */
  --ds-space-fixed-40: 2.5rem;     /* 40 px */
  --ds-space-fixed-50: 3.125rem;   /* 50 px */
  --ds-space-fixed-60: 3.75rem;    /* 60 px */

  /* ── Radii ────────────────────────────────────────────────────────────── */
  --ds-radius-xs:    2px;
  --ds-radius-sm:    4px;
  --ds-radius-md:    8px;
  --ds-radius-lg:    12px;
  --ds-radius-card:  14px;        /* Apple-Wallet/mDL reference */
  --ds-radius-full:  9999px;

  /* ── Touch / hit-target floors (HL-DS-8, HL-DS-9) ─────────────────────── */
  --ds-size-touch-min:   44px;
  --ds-size-input-min:   48px;
  --ds-size-icon-btn:    44px;
  --ds-size-btn-default: 48px;

  /* ── Color tokens — Light mode (OKLCH; HEX fallback in @supports below) ── */
  /* Surface — warm-neutral, Hue 80°, chroma ≤ 0.005 (HL-DS-3 cap) */
  --ds-color-surface:        oklch(100% 0 0);
  --ds-color-surface-raised: oklch(98%  0.002 80);
  --ds-color-surface-muted:  oklch(95%  0.003 80);

  /* Border — warm-neutral hairlines */
  --ds-color-border:         oklch(86% 0.004 80);
  --ds-color-border-strong:  oklch(65% 0.005 80);

  /* Text — cool-neutral, Hue 250°. text-muted is the V1.5.1-hardened floor
     (5.63:1 light, HL-DS-7); NOT to be relaxed. */
  --ds-color-text-primary:   oklch(20% 0.005 250);
  --ds-color-text-secondary: oklch(45% 0.005 250);
  --ds-color-text-muted:     oklch(55% 0.015 250);

  /* Accent — single chromatic family: Trust-Blau (Hue 252°, HL-DS-3) */
  --ds-color-accent:            oklch(40% 0.12 252);
  --ds-color-accent-soft:       oklch(95% 0.025 252);
  --ds-color-accent-foreground: oklch(100% 0 0);

  /* Status families — exactly three (HL-DS-3) */
  --ds-color-warning:      oklch(55% 0.13 80);
  --ds-color-warning-soft: oklch(97% 0.04 90);
  --ds-color-danger:       oklch(48% 0.18 27);
  --ds-color-success:      oklch(45% 0.12 152);

  /* Föderalismus-Info-Soft (HL-DS-14) */
  --ds-color-info-soft: oklch(94% 0.018 245);

  /* ── Shadow tiers — exactly three (HL-DS-2) ───────────────────────────── */
  --ds-shadow-card:    0 1px 2px 0 rgb(0 0 0 / 0.04),
                       0 1px 3px 0 rgb(0 0 0 / 0.06);
  --ds-shadow-popover: 0 4px 8px -2px rgb(0 0 0 / 0.06),
                       0 8px 16px -4px rgb(0 0 0 / 0.08);
  --ds-shadow-modal:   0 12px 24px -6px rgb(0 0 0 / 0.10),
                       0 20px 48px -12px rgb(0 0 0 / 0.14);

  /* ── Motion (no bounce/overshoot — Trust-Anchor; HL-DS-4) ─────────────── */
  --ds-ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);
  --ds-ease-in:     cubic-bezier(0.64, 0,    0.78, 0.39);
  --ds-ease-in-out: cubic-bezier(0.65, 0,    0.35, 1);
  --ds-ease-handoff:cubic-bezier(0.65, 0,    0.35, 1);  /* same curve, longer dur */

  /* Stronger UI curves — Emil Kowalski / Refactoring-UI calibre.
     Use these for hover, press, popover entry — they have more punch than
     the default ease-* family above. */
  --ds-ease-out-strong:    cubic-bezier(0.23, 1, 0.32, 1);
  --ds-ease-in-out-strong: cubic-bezier(0.77, 0, 0.175, 1);
  --ds-ease-drawer:        cubic-bezier(0.32, 0.72, 0, 1);

  --ds-duration-press:   140ms;
  --ds-duration-fast:    140ms;
  --ds-duration-base:    180ms;
  --ds-duration-medium:  240ms;
  --ds-duration-handoff: 400ms;

  /* ── Editorial type — for the signature moment on each screen ─────────── */
  --ds-text-mega:    7rem;     /* 112 px — register count, big KPI */
  --ds-text-jumbo:   4.5rem;   /*  72 px — secondary monumental */
  --ds-line-mega:    0.95;
  --ds-line-jumbo:   1.0;
}

/* ── Dark mode — auto via OS, also class-based via next-themes ──────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --ds-color-surface:        oklch(15% 0.004 250);
    --ds-color-surface-raised: oklch(20% 0.005 250);
    --ds-color-surface-muted:  oklch(24% 0.006 250);
    --ds-color-border:         oklch(32% 0.008 250);
    --ds-color-border-strong:  oklch(45% 0.01  250);
    --ds-color-text-primary:   oklch(94% 0.004 250);
    --ds-color-text-secondary: oklch(78% 0.005 250);
    --ds-color-text-muted:     oklch(64% 0.012 250);  /* 5.53:1 floor, HL-DS-7 */
    --ds-color-accent:            oklch(72% 0.13  252);
    --ds-color-accent-soft:       oklch(32% 0.05  252);
    --ds-color-accent-foreground: oklch(15% 0.004 250);
    --ds-color-warning:      oklch(78% 0.13 80);
    --ds-color-warning-soft: oklch(28% 0.05 80);
    --ds-color-danger:       oklch(72% 0.13 27);
    --ds-color-success:      oklch(76% 0.11 152);
    --ds-color-info-soft:    oklch(28% 0.04 245);
  }
}

.dark {
  --ds-color-surface:        oklch(15% 0.004 250);
  --ds-color-surface-raised: oklch(20% 0.005 250);
  --ds-color-surface-muted:  oklch(24% 0.006 250);
  --ds-color-border:         oklch(32% 0.008 250);
  --ds-color-border-strong:  oklch(45% 0.01  250);
  --ds-color-text-primary:   oklch(94% 0.004 250);
  --ds-color-text-secondary: oklch(78% 0.005 250);
  --ds-color-text-muted:     oklch(64% 0.012 250);
  --ds-color-accent:            oklch(72% 0.13  252);
  --ds-color-accent-soft:       oklch(32% 0.05  252);
  --ds-color-accent-foreground: oklch(15% 0.004 250);
  --ds-color-warning:      oklch(78% 0.13 80);
  --ds-color-warning-soft: oklch(28% 0.05 80);
  --ds-color-danger:       oklch(72% 0.13 27);
  --ds-color-success:      oklch(76% 0.11 152);
  --ds-color-info-soft:    oklch(28% 0.04 245);
}

/* ── OKLCH browser fallback (HEX). Legacy Edge / institutional chassis. ──── */
@supports not (color: oklch(0% 0 0)) {
  :root {
    --ds-color-surface:        #FFFFFF;
    --ds-color-surface-raised: #FAFAF8;
    --ds-color-surface-muted:  #F2F1ED;
    --ds-color-border:         #DCDAD3;
    --ds-color-border-strong:  #9F998D;
    --ds-color-text-primary:   #1A1D23;
    --ds-color-text-secondary: #4A5060;
    --ds-color-text-muted:     #6B7280;
    --ds-color-accent:            #1A4D8F;
    --ds-color-accent-soft:       #E8F0FA;
    --ds-color-accent-foreground: #FFFFFF;
    --ds-color-warning:      #946400;
    --ds-color-warning-soft: #FFF8E1;
    --ds-color-danger:       #B3261E;
    --ds-color-success:      #2D6B3F;
    --ds-color-info-soft:    #E6EEF7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ds-color-surface:        #0F1115;
      --ds-color-surface-raised: #161A20;
      --ds-color-surface-muted:  #1C2128;
      --ds-color-border:         #2B2F38;
      --ds-color-border-strong:  #4A5060;
      --ds-color-text-primary:   #ECEEF2;
      --ds-color-text-secondary: #B4BAC4;
      --ds-color-text-muted:     #8A93A0;
      --ds-color-accent:            #6FA8FF;
      --ds-color-accent-soft:       #1F3A5C;
      --ds-color-accent-foreground: #0F1115;
      --ds-color-warning:      #E5B547;
      --ds-color-warning-soft: #3A2D0E;
      --ds-color-danger:       #F2837C;
      --ds-color-success:      #6FCB8B;
      --ds-color-info-soft:    #1F2C3E;
    }
  }
}

/* ── prefers-reduced-motion — globally honoured (HL-DS-4) ───────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ── BITV 2.0 high-contrast (WCAG 1.4.6 AAA, ≥ 7:1) ─────────────────────── */
@media (prefers-contrast: more) {
  :root {
    --ds-color-text-primary:   oklch(0%  0 0);
    --ds-color-text-secondary: oklch(15% 0 0);
    --ds-color-text-muted:     oklch(30% 0 0);
    --ds-color-border:         oklch(40% 0 0);
    --ds-color-border-strong:  oklch(20% 0 0);
    --ds-color-accent:         oklch(28% 0.18 252);
    --ds-color-warning:        oklch(30% 0.15 80);
    --ds-color-danger:         oklch(30% 0.20 27);
    --ds-color-success:        oklch(30% 0.13 152);
  }
}

/* ── Tabular numerals — mandatory for Aktenzeichen, FE-Nr, IBAN, dates ──── */
.ds-tabular,
.tabular-nums {
  font-variant-numeric: tabular-nums;
}

/* ============================================================================
   Semantic class hooks — drop straight onto markup.
   ========================================================================= */

html,
body { font-family: var(--ds-font-sans); }

body {
  background: var(--ds-color-surface);
  color: var(--ds-color-text-primary);
  font-size: var(--ds-text-body);
  line-height: var(--ds-line-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.ds-mega   { font-size: clamp(4rem, 12vw, var(--ds-text-mega)); line-height: var(--ds-line-mega); font-weight: 700; letter-spacing: -0.035em; color: var(--ds-color-text-primary); font-variant-numeric: tabular-nums; }
.ds-jumbo  { font-size: clamp(3rem, 8vw, var(--ds-text-jumbo)); line-height: var(--ds-line-jumbo); font-weight: 700; letter-spacing: -0.025em; color: var(--ds-color-text-primary); }
.ds-display { font-size: var(--ds-text-display); line-height: var(--ds-line-display); font-weight: 700; letter-spacing: var(--ds-tracking-tight); color: var(--ds-color-text-primary); }
.ds-h1      { font-size: var(--ds-text-h1);      line-height: var(--ds-line-h1);      font-weight: 600; letter-spacing: var(--ds-tracking-tight); color: var(--ds-color-text-primary); }
.ds-h2      { font-size: var(--ds-text-h2);      line-height: var(--ds-line-h2);      font-weight: 600; color: var(--ds-color-text-primary); }
.ds-h3      { font-size: var(--ds-text-h3);      line-height: var(--ds-line-h3);      font-weight: 600; color: var(--ds-color-text-primary); }
.ds-body    { font-size: var(--ds-text-body);    line-height: var(--ds-line-body);    font-weight: 400; color: var(--ds-color-text-primary); }
.ds-body-s  { font-size: var(--ds-text-body-s);  line-height: var(--ds-line-body);    font-weight: 400; color: var(--ds-color-text-secondary); }
.ds-caption { font-size: var(--ds-text-small);   line-height: var(--ds-line-small);   font-weight: 500; color: var(--ds-color-text-secondary); }
.ds-eyebrow { font-size: var(--ds-text-tiny);    line-height: 1.45; font-weight: 600; letter-spacing: var(--ds-tracking-wide); text-transform: uppercase; color: var(--ds-color-text-muted); }
.ds-mono    { font-family: var(--ds-font-mono); font-variant-numeric: tabular-nums; }

/* Branded text-selection — small detail, big polish */
::selection { background: color-mix(in oklch, var(--ds-color-accent) 22%, transparent); color: var(--ds-color-text-primary); }

/* Focus ring — 2 px outline + 2 px offset, accent color (HL-DS-7 ≥ 3:1) */
.ds-focus,
.ds-focus:focus-visible,
:where(button, a, input, select, textarea):focus-visible {
  outline: 2px solid var(--ds-color-accent);
  outline-offset: 2px;
  border-radius: var(--ds-radius-sm);
}

/* AR (right-to-left) — Source Sans 3 has limited Arabic glyphs */
[lang="ar"] {
  --ds-font-sans:
    'Source Sans 3', 'Noto Sans Arabic', 'Segoe UI', system-ui,
    -apple-system, sans-serif;
  direction: rtl;
}


/* ─── ui_kits/web/styles.css ─── */
/* UI-kit styles — overhauled per Refactoring-UI + Top-Design + Emil Kowalski rules.
   Tokens from ../../colors_and_type.css. */
* { box-sizing: border-box; }
html, body, #root { margin: 0; padding: 0; min-height: 100%; }
body {
  background: var(--ds-color-surface);
  color: var(--ds-color-text-primary);
  font-family: var(--ds-font-sans);
  font-size: var(--ds-text-body);
  line-height: var(--ds-line-body);
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

::selection {
  background: color-mix(in oklch, var(--ds-color-accent) 24%, transparent);
  color: var(--ds-color-text-primary);
}

/* ════════════════════════════════════════════════════════════════════
   APP SHELL — sidebar / topbar / main / footer
   ═══════════════════════════════════════════════════════════════════ */
.app { display: flex; min-height: 100vh; background: var(--ds-color-surface); }

.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--ds-color-surface);
  border-inline-end: 1px solid var(--ds-color-border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar-brand {
  height: 64px; padding: 0 20px;
  display: flex; align-items: center; gap: 12px;
  font-size: 15px; font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.sidebar-brand .brand-icon { color: var(--ds-color-accent); display: inline-flex; }
.sidebar nav { padding: 8px 12px 24px; flex: 1; overflow-y: auto; }
.sidebar-section-label {
  display: block;
  padding: 16px 12px 6px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ds-color-text-muted);
}
.sidebar nav ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 1px; }

.nav-item {
  min-height: 36px;
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px;
  border-radius: 6px;
  border-inline-start: 2px solid transparent;
  margin-inline-start: -2px;
  color: var(--ds-color-text-secondary);
  font-size: 13.5px;
  font-weight: 500;
  transition: background var(--ds-duration-press) var(--ds-ease-out-strong),
              color var(--ds-duration-press) var(--ds-ease-out-strong);
}
.nav-item .nav-icon { color: var(--ds-color-text-muted); display: inline-flex; transition: color var(--ds-duration-press) var(--ds-ease-out-strong); }
@media (hover: hover) and (pointer: fine) {
  .nav-item:hover { color: var(--ds-color-text-primary); background: var(--ds-color-surface-muted); }
  .nav-item:hover .nav-icon { color: var(--ds-color-text-secondary); }
}
.nav-item.active {
  background: color-mix(in oklch, var(--ds-color-accent) 8%, var(--ds-color-surface));
  border-inline-start-color: var(--ds-color-accent);
  color: var(--ds-color-text-primary);
  font-weight: 600;
}
.nav-item.active .nav-icon { color: var(--ds-color-accent); }
.nav-item:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: -2px; }
.nav-item .nav-count {
  margin-inline-start: auto;
  font-size: 11px; font-weight: 600;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
}
.nav-item.active .nav-count { color: var(--ds-color-accent); }

.main-col { display: flex; flex-direction: column; flex: 1; min-width: 0; }

.topbar {
  height: 64px; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--ds-color-border);
  background: color-mix(in oklch, var(--ds-color-surface) 78%, transparent);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 30;
}
.topbar .topbar-crumb {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--ds-color-text-muted);
  white-space: nowrap;
}
.topbar .topbar-crumb .here { color: var(--ds-color-text-primary); font-weight: 500; }
.topbar-actions { display: flex; align-items: center; gap: 4px; }

.icon-btn {
  width: 34px; height: 34px;
  border: 1px solid transparent;
  background: transparent;
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ds-color-text-secondary);
  transition: background var(--ds-duration-press) var(--ds-ease-out-strong),
              color var(--ds-duration-press) var(--ds-ease-out-strong),
              transform var(--ds-duration-press) var(--ds-ease-out-strong);
}
.icon-btn:hover { background: var(--ds-color-surface-muted); color: var(--ds-color-text-primary); }
.icon-btn:active { transform: scale(0.94); }
.icon-btn:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: 1px; }

.disclaimer-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 32px;
  background: var(--ds-color-surface-muted);
  color: var(--ds-color-text-muted);
  font-size: 11.5px;
  border-bottom: 1px solid var(--ds-color-border);
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.disclaimer-bar > * { flex-shrink: 0; }
.disclaimer-bar > .ellipsis { flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.disclaimer-bar strong { color: var(--ds-color-text-secondary); font-weight: 600; }

main.app-main {
  flex: 1;
  padding: 48px 56px 80px;
}
@media (max-width: 900px) { main.app-main { padding: 32px 24px 64px; } }
main.app-main > .inner {
  max-width: 1080px; margin: 0 auto;
}
.app-footer {
  padding: 20px 32px;
  border-top: 1px solid var(--ds-color-border);
  font-size: 11.5px; color: var(--ds-color-text-muted);
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: 0.01em;
  gap: 24px;
  flex-wrap: wrap;
}
.app-footer > span { white-space: nowrap; }

/* ════════════════════════════════════════════════════════════════════
   TYPOGRAPHY HELPERS — refactoring-ui hierarchy patterns
   ═══════════════════════════════════════════════════════════════════ */
.eyebrow {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ds-color-text-muted);
}
.eyebrow-accent { color: var(--ds-color-accent); }

.lede {
  font-size: 18px;
  line-height: 1.5;
  color: var(--ds-color-text-secondary);
  max-width: 60ch;
}

/* Editorial page-opener — used instead of repetitive page-headers */
.page-opener {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 48px;
}
.page-opener h1 {
  font-size: 32px;
  line-height: 1.15;
  font-weight: 600;
  letter-spacing: -0.015em;
  margin: 0;
  max-width: 22ch;
  text-wrap: balance;
}
.page-opener .lede { margin: 4px 0 0; }

/* Section dividers — uses an eyebrow + thin rule */
.section-mark {
  display: flex; align-items: center; gap: 14px;
  margin: 56px 0 20px;
}
.section-mark .num {
  font-variant-numeric: tabular-nums;
  font-size: 11px; font-weight: 600;
  color: var(--ds-color-text-muted);
  white-space: nowrap;
}
.section-mark .label {
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ds-color-text-secondary);
  white-space: nowrap;
}
.section-mark .rule {
  flex: 1; height: 1px; background: var(--ds-color-border);
}

/* ════════════════════════════════════════════════════════════════════
   PRIMITIVES — button / card / input / badge / chip
   ═══════════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  height: 40px; padding: 0 16px;
  border-radius: 8px;
  border: 1px solid transparent;
  font-weight: 500; font-size: 14px;
  white-space: nowrap;
  letter-spacing: -0.005em;
  /* Specific properties, not 'all'. Strong ease-out. (Emil rule) */
  transition:
    background-color var(--ds-duration-press) var(--ds-ease-out-strong),
    color            var(--ds-duration-press) var(--ds-ease-out-strong),
    border-color     var(--ds-duration-press) var(--ds-ease-out-strong),
    transform        var(--ds-duration-press) var(--ds-ease-out-strong),
    box-shadow       var(--ds-duration-press) var(--ds-ease-out-strong);
}
.btn:active:not(:disabled) { transform: scale(0.97); }   /* Emil rule: tactile press */
.btn:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: 2px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: var(--ds-color-text-primary);
  color: var(--ds-color-surface);
  min-height: 44px;
}
.btn-primary:hover { background: color-mix(in oklch, var(--ds-color-text-primary) 88%, transparent); }

.btn-accent {
  background: var(--ds-color-accent);
  color: var(--ds-color-accent-foreground);
  min-height: 44px;
  padding: 0 20px;
  font-weight: 600;
}
.btn-accent:hover { background: color-mix(in oklch, var(--ds-color-accent) 88%, black); }

.btn-outline {
  background: var(--ds-color-surface);
  border-color: var(--ds-color-border-strong);
  color: var(--ds-color-text-primary);
}
.btn-outline:hover { background: var(--ds-color-surface-muted); border-color: var(--ds-color-text-secondary); }

.btn-ghost { background: transparent; color: var(--ds-color-text-primary); }
.btn-ghost:hover { background: var(--ds-color-surface-muted); }

.btn-link {
  background: transparent;
  color: var(--ds-color-accent);
  padding: 0; height: auto;
  font-weight: 500;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
}
.btn-link:hover { text-decoration-thickness: 2px; }

.btn-sm { height: 32px; min-height: 32px; padding: 0 12px; font-size: 13px; gap: 6px; }

/* Card — sparingly used. Default is bare surface; ".card" only when grouping is needed. */
.card {
  background: var(--ds-color-surface);
  border: 1px solid var(--ds-color-border);
  border-radius: 10px;
  padding: 24px;
}
.card-raised { background: var(--ds-color-surface-raised); }
.card-hover { transition: border-color var(--ds-duration-base) var(--ds-ease-out-strong),
                          box-shadow var(--ds-duration-base) var(--ds-ease-out-strong);
              cursor: pointer; }
.card-hover:hover { border-color: var(--ds-color-text-secondary); box-shadow: var(--ds-shadow-card); }
.card-hover:active { transform: scale(0.998); transition-duration: 100ms; }

/* Input — refactoring-ui inputs */
.input {
  height: 44px;
  padding: 0 14px;
  width: 100%;
  border: 1px solid var(--ds-color-border-strong);
  border-radius: 8px;
  background: var(--ds-color-surface);
  color: var(--ds-color-text-primary);
  font: inherit; font-size: 15px;
  outline: none;
  transition: border-color var(--ds-duration-press) var(--ds-ease-out-strong),
              box-shadow var(--ds-duration-press) var(--ds-ease-out-strong);
}
.input::placeholder { color: var(--ds-color-text-muted); }
.input:focus { border-color: var(--ds-color-accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--ds-color-accent) 22%, transparent); }
.input-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ds-color-text-muted);
  margin-bottom: 6px;
}
.input-hint { font-size: 12px; color: var(--ds-color-text-muted); margin-top: 6px; }

/* Badge / chip */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--ds-color-border);
  background: var(--ds-color-surface-muted);
  font-size: 11px;
  font-weight: 500;
  color: var(--ds-color-text-secondary);
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.badge-pill { border-radius: 999px; padding: 3px 10px; }
.badge-pilot {
  background: var(--ds-color-info-soft);
  color: var(--ds-color-accent);
  border-color: color-mix(in oklch, var(--ds-color-accent) 25%, transparent);
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-size: 10.5px;
  padding: 4px 10px;
}
.badge-success {
  background: color-mix(in oklch, var(--ds-color-success) 10%, transparent);
  color: var(--ds-color-success);
  border-color: color-mix(in oklch, var(--ds-color-success) 30%, transparent);
}
.badge-mock {
  background: transparent;
  color: var(--ds-color-text-muted);
  border: 1px dashed var(--ds-color-border-strong);
  font-family: var(--ds-font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  padding: 1px 6px;
}

/* Frist chip — pill with urgency tier */
.frist-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12.5px; font-weight: 500;
  white-space: nowrap;
  box-shadow: inset 0 0 0 1px transparent;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.005em;
}
.frist-chip.tier-normal { background: var(--ds-color-surface-muted); color: var(--ds-color-text-secondary); box-shadow: inset 0 0 0 1px var(--ds-color-border); }
.frist-chip.tier-urgent {
  background: var(--ds-color-warning-soft);
  color: #4a2e00;
  box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--ds-color-warning) 40%, transparent);
  font-weight: 600;
}
.dark .frist-chip.tier-urgent { color: var(--ds-color-warning); }
.frist-chip.tier-very-urgent {
  background: color-mix(in oklch, var(--ds-color-danger) 12%, var(--ds-color-surface));
  color: var(--ds-color-danger);
  box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--ds-color-danger) 38%, transparent);
  font-weight: 600;
}
.frist-chip.tier-overdue {
  background: var(--ds-color-danger);
  color: var(--ds-color-surface);
  font-weight: 600;
}

/* Norm citation */
.norm-cite {
  background: color-mix(in oklch, var(--ds-color-accent-soft) 80%, transparent);
  color: var(--ds-color-accent);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: var(--ds-font-mono);
  font-size: 0.92em;
  font-weight: 500;
}

/* ════════════════════════════════════════════════════════════════════
   DASHBOARD — signature moment: one hero KPI + supporting strip
   ═══════════════════════════════════════════════════════════════════ */
.dash-hero {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 56px;
  align-items: end;
  padding: 32px 0 40px;
  border-bottom: 1px solid var(--ds-color-border);
  margin-bottom: 56px;
}
@media (max-width: 880px) { .dash-hero { grid-template-columns: 1fr; gap: 32px; padding: 24px 0 32px; margin-bottom: 32px; } }

.dash-hero .greeting {
  display: flex; flex-direction: column; gap: 12px;
}
.dash-hero .greeting .ds-jumbo { max-width: 14ch; }
.dash-hero .greeting .name {
  color: var(--ds-color-text-primary);
}
.dash-hero .greeting .date {
  font-size: 13px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.dash-hero .summary {
  display: flex; flex-direction: column; gap: 12px;
}
.dash-hero .summary p {
  margin: 0;
  font-size: 17px;
  line-height: 1.5;
  color: var(--ds-color-text-secondary);
  max-width: 36ch;
  text-wrap: pretty;
}
.dash-hero .summary strong { color: var(--ds-color-text-primary); font-weight: 600; }

.dash-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  margin-bottom: 56px;
}
@media (max-width: 760px) { .dash-stats { grid-template-columns: 1fr; } }
.dash-stat {
  padding: 24px 28px;
  border-inline-end: 1px solid var(--ds-color-border);
  display: flex; flex-direction: column; gap: 10px;
}
.dash-stat:first-child { padding-inline-start: 0; }
.dash-stat:last-child { border-inline-end: none; padding-inline-end: 0; }
@media (max-width: 760px) {
  .dash-stat { border-inline-end: none; border-bottom: 1px solid var(--ds-color-border); padding: 20px 0; }
  .dash-stat:last-child { border-bottom: none; }
}
.dash-stat .lbl {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ds-color-text-muted);
}
.dash-stat .val {
  font-size: 40px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.025em;
  line-height: 1;
  color: var(--ds-color-text-primary);
}
.dash-stat .foot {
  font-size: 12.5px;
  color: var(--ds-color-text-secondary);
  line-height: 1.4;
}

/* ════════════════════════════════════════════════════════════════════
   STAMMDATEN HERO — signature moment: massive register count
   ═══════════════════════════════════════════════════════════════════ */
.stamm-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 48px;
  align-items: end;
  padding: 16px 0 48px;
  border-bottom: 1px solid var(--ds-color-border);
  margin-bottom: 56px;
}
@media (max-width: 880px) { .stamm-hero { grid-template-columns: 1fr; gap: 24px; padding-bottom: 32px; margin-bottom: 32px; } }

.stamm-hero .count-block {
  display: flex; flex-direction: column; gap: 4px;
}
.stamm-hero .count-block .ds-mega { color: var(--ds-color-text-primary); }
.stamm-hero .count-block .lbl {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ds-color-text-muted);
  white-space: nowrap;
}
.stamm-hero .context {
  display: flex; flex-direction: column; gap: 18px;
  padding-bottom: 8px;
}
.stamm-hero .context .last {
  font-size: 15px;
  line-height: 1.55;
  color: var(--ds-color-text-secondary);
  max-width: 48ch;
}
.stamm-hero .context .last strong { color: var(--ds-color-text-primary); font-weight: 600; }
.stamm-hero .context .actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* Tabs — inline, underline-style */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--ds-color-border);
  margin-bottom: 32px;
}
.tabs .tab {
  background: none; border: none;
  padding: 12px 18px 12px 0;
  margin-inline-end: 24px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ds-color-text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  letter-spacing: -0.005em;
  white-space: nowrap;
  transition: color var(--ds-duration-press) var(--ds-ease-out-strong),
              border-color var(--ds-duration-press) var(--ds-ease-out-strong);
}
.tabs .tab:hover { color: var(--ds-color-text-secondary); }
.tabs .tab.active {
  color: var(--ds-color-text-primary);
  font-weight: 600;
  border-bottom-color: var(--ds-color-text-primary);
}
.tabs .tab:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: 2px; border-radius: 2px; }

/* Stammdaten sections — sectioned table layout */
.stamm-sections {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--ds-color-border);
  border: 1px solid var(--ds-color-border);
  border-radius: 10px;
  overflow: hidden;
}
@media (max-width: 760px) { .stamm-sections { grid-template-columns: 1fr; } }
.stamm-section {
  padding: 24px 28px;
  background: var(--ds-color-surface);
  display: flex; flex-direction: column; gap: 14px;
}
.stamm-section h3 {
  margin: 0;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ds-color-text-muted);
}
.stamm-section .fields { display: flex; flex-direction: column; gap: 12px; }
.stamm-section .field {
  display: grid;
  grid-template-columns: minmax(0, auto) 1fr;
  gap: 16px;
  align-items: baseline;
}
.stamm-section .field .lbl {
  font-size: 13.5px;
  color: var(--ds-color-text-secondary);
  line-height: 1.5;
  white-space: nowrap;
}
.stamm-section .field .val {
  font-size: 14.5px;
  color: var(--ds-color-text-primary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  text-align: end;
  line-height: 1.5;
  letter-spacing: -0.005em;
  min-width: 0;
  overflow-wrap: anywhere;
}
.stamm-section .correct {
  align-self: flex-start;
  font-size: 12.5px;
  color: var(--ds-color-accent);
  background: none; border: none; padding: 0;
  text-decoration: underline; text-underline-offset: 3px;
  cursor: pointer;
  white-space: nowrap;
}

/* ════════════════════════════════════════════════════════════════════
   POSTEINGANG — letter list
   ═══════════════════════════════════════════════════════════════════ */
.inbox-toolbar {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.search-wrap { flex: 1; min-width: 260px; position: relative; }
.search-wrap svg { position: absolute; inset-inline-start: 14px; top: 50%; transform: translateY(-50%); color: var(--ds-color-text-muted); pointer-events: none; }
.search-wrap input {
  height: 44px; width: 100%;
  padding: 0 16px 0 42px;
  border: 1px solid var(--ds-color-border);
  border-radius: 8px;
  background: var(--ds-color-surface);
  color: var(--ds-color-text-primary);
  font-size: 14px;
  outline: none;
  transition: border-color var(--ds-duration-press) var(--ds-ease-out-strong),
              box-shadow var(--ds-duration-press) var(--ds-ease-out-strong);
}
.search-wrap input::placeholder { color: var(--ds-color-text-muted); }
.search-wrap input:focus { border-color: var(--ds-color-accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--ds-color-accent) 18%, transparent); }

.letter-list { display: flex; flex-direction: column; gap: 32px; }
.letter-group { display: flex; flex-direction: column; gap: 4px; }
.letter-group-head {
  display: flex; align-items: baseline; gap: 12px;
  padding-bottom: 12px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--ds-color-border);
}
.letter-group-head .label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ds-color-text-secondary);
  white-space: nowrap;
}
.letter-group-head .count {
  font-size: 11px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
}
.letter-group-head.urgent .label { color: var(--ds-color-danger); }

.letter-row {
  display: grid;
  grid-template-columns: minmax(160px, 200px) 1fr auto;
  gap: 24px;
  padding: 18px 4px;
  border-bottom: 1px solid var(--ds-color-border);
  align-items: center;
  cursor: pointer;
  transition: background-color var(--ds-duration-press) var(--ds-ease-out-strong);
}
.letter-row:last-child { border-bottom: none; }
.letter-row:hover { background: color-mix(in oklch, var(--ds-color-surface-muted) 60%, transparent); }
.letter-row:active { transform: scale(0.998); }
.letter-row:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: -2px; border-radius: 6px; }

.letter-row .frist-col { display: flex; align-items: center; gap: 10px; }
.letter-row .unread-dot { width: 7px; height: 7px; background: var(--ds-color-accent); border-radius: 50%; flex-shrink: 0; }

.letter-row .content-col { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.letter-row .content-col .head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.letter-row .content-col .behoerde {
  font-size: 15px;
  font-weight: 600;
  color: var(--ds-color-text-primary);
  letter-spacing: -0.005em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.letter-row .content-col .brieftyp {
  font-size: 14px;
  color: var(--ds-color-text-secondary);
  line-height: 1.4;
}
.letter-row .content-col .akz {
  font-size: 11.5px;
  font-variant-numeric: tabular-nums;
  color: var(--ds-color-text-muted);
  letter-spacing: 0.02em;
}

.letter-row.unread .behoerde { color: var(--ds-color-text-primary); }
.letter-row.read { opacity: 0.72; }
.letter-row.read .behoerde { font-weight: 500; }

.letter-row .action-col {
  display: flex; align-items: center; gap: 10px;
  font-size: 12.5px;
  color: var(--ds-color-text-muted);
  font-weight: 500;
  white-space: nowrap;
}
.letter-row .action-col .arrow {
  color: var(--ds-color-text-muted);
  transition: color var(--ds-duration-press) var(--ds-ease-out-strong),
              transform var(--ds-duration-press) var(--ds-ease-out-strong);
}
.letter-row:hover .action-col .arrow { color: var(--ds-color-text-primary); transform: translateX(2px); }

/* ═════════════════════════════════════════════════════════════════════
   POSTEINGANG — tabular inbox: header + tabs + search + dense rows
   (.letter-row above is kept for the Dashboard „Heute zu erledigen” strip)
   ═══════════════════════════════════════════════════════════════════ */
.inbox-header {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 24px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.inbox-header h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.015em;
  line-height: 1.15;
}
.inbox-header .stats {
  margin: 4px 0 0;
  font-size: 13.5px;
  color: var(--ds-color-text-secondary);
}
.inbox-header .stats .sep { color: var(--ds-color-text-muted); }
.inbox-header .masthead-date {
  font-size: 12.5px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.inbox-controls {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--ds-color-border);
}
.inbox-tabs {
  display: flex; gap: 2px;
  background: var(--ds-color-surface-muted);
  padding: 3px;
  border-radius: 8px;
  flex-shrink: 0;
}
.inbox-tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ds-color-text-secondary);
  background: transparent;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: -0.005em;
  transition: background var(--ds-duration-press) var(--ds-ease-out-strong),
              color var(--ds-duration-press) var(--ds-ease-out-strong);
}
.inbox-tab:hover { color: var(--ds-color-text-primary); }
.inbox-tab.active {
  background: var(--ds-color-surface);
  color: var(--ds-color-text-primary);
  font-weight: 600;
  box-shadow: 0 1px 2px rgb(0 0 0 / 0.05), 0 0 0 1px var(--ds-color-border);
}
.inbox-tab .count {
  font-size: 11px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.inbox-tab.active .count { color: var(--ds-color-text-secondary); }
.inbox-tab:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: 2px; }

.inbox-search {
  position: relative;
  flex: 1; min-width: 200px; max-width: 360px;
  margin-inline-start: auto;
}
.inbox-search svg {
  position: absolute; inset-inline-start: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--ds-color-text-muted);
  pointer-events: none;
}
.inbox-search input {
  height: 36px; width: 100%;
  padding: 0 12px 0 36px;
  border: 1px solid var(--ds-color-border);
  border-radius: 7px;
  background: var(--ds-color-surface);
  color: var(--ds-color-text-primary);
  font-size: 13px;
  outline: none;
  transition: border-color var(--ds-duration-press) var(--ds-ease-out-strong),
              box-shadow var(--ds-duration-press) var(--ds-ease-out-strong);
}
.inbox-search input::placeholder { color: var(--ds-color-text-muted); }
.inbox-search input:focus {
  border-color: var(--ds-color-accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--ds-color-accent) 18%, transparent);
}

.inbox-table { display: flex; flex-direction: column; }

.inbox-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 4px 16px;
  padding: 14px 8px 14px 4px;
  border-bottom: 1px solid var(--ds-color-border);
  cursor: pointer;
  align-items: start;
  transition: background-color var(--ds-duration-press) var(--ds-ease-out-strong);
}
.inbox-row:hover { background: color-mix(in oklch, var(--ds-color-surface-muted) 60%, transparent); }
.inbox-row:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: -1px; border-radius: 4px; }

.inbox-row .status-col { display: flex; align-items: center; padding-top: 5px; padding-inline-start: 4px; }
.inbox-row .dot { display: inline-flex; align-items: center; justify-content: center; }
.inbox-row .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ds-color-accent); }
.inbox-row .done-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: color-mix(in oklch, var(--ds-color-success) 18%, transparent);
  color: var(--ds-color-success);
}
.inbox-row .empty-dot { width: 7px; height: 7px; }

.inbox-row .content-col { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

.inbox-row .row-top {
  display: flex; align-items: baseline; gap: 10px;
  font-size: 14.5px;
  letter-spacing: -0.005em;
}
.inbox-row .row-top .behoerde {
  color: var(--ds-color-text-primary);
  font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.inbox-row.unread .row-top .behoerde { font-weight: 700; }
.inbox-row .row-top .kategorie {
  font-size: 11px;
  font-weight: 500;
  color: var(--ds-color-text-muted);
  letter-spacing: 0.02em;
  white-space: nowrap;
  flex-shrink: 0;
}

.inbox-row .row-mid {
  display: flex; align-items: baseline; gap: 8px;
  font-size: 13px;
  color: var(--ds-color-text-secondary);
  min-width: 0;
}
.inbox-row .row-mid .brieftyp {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.inbox-row .row-mid .sep { color: var(--ds-color-text-muted); flex-shrink: 0; }
.inbox-row .row-mid .akz {
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  flex-shrink: 0;
  letter-spacing: -0.005em;
}

.inbox-row .row-preview {
  margin: 4px 0 0;
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ds-color-text-muted);
  max-width: 86ch;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.inbox-row.unread .row-preview { color: var(--ds-color-text-secondary); }

.inbox-row .meta-col {
  display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  white-space: nowrap;
  padding-top: 2px;
}
.inbox-row .meta-col .date {
  font-size: 12px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.005em;
}
.inbox-row.unread .meta-col .date { color: var(--ds-color-text-secondary); font-weight: 500; }
.inbox-row .meta-col .auth-mini { color: var(--ds-color-success); display: inline-flex; }

.inbox-row.done { opacity: 0.62; }
.inbox-row.done .behoerde { font-weight: 400; }
.inbox-row.done .row-preview { display: none; }

.inbox-empty {
  padding: 48px 16px;
  text-align: center;
  color: var(--ds-color-text-muted);
  font-size: 14px;
  border-bottom: 1px solid var(--ds-color-border);
}

/* ═════════════════════════════════════════════════════════════════════
   POSTEINGANG — Gmail Priority Inbox: sections by urgency, dense rows
   ═══════════════════════════════════════════════════════════════════ */
.inbox-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.inbox-header h1 {
  margin: 0;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.015em;
  line-height: 1.15;
  color: var(--ds-color-text-primary);
}
.inbox-header .stats {
  margin: 4px 0 0;
  font-size: 13px;
  color: var(--ds-color-text-secondary);
}
.inbox-header .stats .sep { color: var(--ds-color-text-muted); }
.inbox-header .stats .urgent-stat { color: var(--ds-color-danger); font-weight: 600; }

.inbox-search {
  position: relative;
  width: 280px;
  flex-shrink: 0;
}
.inbox-search svg {
  position: absolute; inset-inline-start: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--ds-color-text-muted);
  pointer-events: none;
}
.inbox-search input {
  height: 36px; width: 100%;
  padding: 0 12px 0 36px;
  border: 1px solid var(--ds-color-border);
  border-radius: 8px;
  background: var(--ds-color-surface);
  color: var(--ds-color-text-primary);
  font-size: 13px;
  outline: none;
  transition: border-color var(--ds-duration-press) var(--ds-ease-out-strong),
              box-shadow var(--ds-duration-press) var(--ds-ease-out-strong);
}
.inbox-search input::placeholder { color: var(--ds-color-text-muted); }
.inbox-search input:focus {
  border-color: var(--ds-color-accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--ds-color-accent) 18%, transparent);
}

.inbox-list { display: flex; flex-direction: column; gap: 0; }

.inbox-section { display: flex; flex-direction: column; }

.inbox-section-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 0 10px;
  border-bottom: 1px solid var(--ds-color-border);
  margin-top: 16px;
  user-select: none;
}
.inbox-section:first-child .inbox-section-head { margin-top: 0; }
.inbox-section-head .caret {
  color: var(--ds-color-text-muted);
  margin-inline-start: -4px;
}
.inbox-section-head .label {
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ds-color-text-primary);
  white-space: nowrap;
}
.inbox-section.tone-danger  .inbox-section-head .label { color: var(--ds-color-danger); }
.inbox-section.tone-warning .inbox-section-head .label { color: #6b4500; }
.dark .inbox-section.tone-warning .inbox-section-head .label { color: var(--ds-color-warning); }
.inbox-section.tone-neutral .inbox-section-head .label { color: var(--ds-color-text-secondary); }
.inbox-section.tone-muted   .inbox-section-head .label { color: var(--ds-color-text-muted); font-weight: 500; letter-spacing: 0.06em; }
.inbox-section-head .count {
  font-size: 12px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.005em;
}
.inbox-section-head[role="button"] { cursor: pointer; }
.inbox-section-head[role="button"]:focus-visible {
  outline: 2px solid var(--ds-color-accent); outline-offset: 2px; border-radius: 4px;
}

.inbox-section-body { display: flex; flex-direction: column; }

.inbox-row {
  display: grid;
  grid-template-columns: 168px 1fr auto;
  gap: 20px;
  align-items: center;
  padding: 12px 8px 12px 4px;
  border-bottom: 1px solid var(--ds-color-border);
  cursor: pointer;
  transition: background-color var(--ds-duration-press) var(--ds-ease-out-strong);
}
.inbox-row:hover { background: color-mix(in oklch, var(--ds-color-surface-muted) 70%, transparent); }
.inbox-row:focus-visible { outline: 2px solid var(--ds-color-accent); outline-offset: -1px; border-radius: 4px; }

.inbox-row .frist-col { display: flex; align-items: center; }
.inbox-row .frist-col .no-frist {
  color: var(--ds-color-text-muted);
  font-size: 13px;
  padding-inline-start: 6px;
}

.inbox-row .content-col {
  display: grid;
  grid-template-columns: minmax(0, auto) 1fr minmax(0, auto);
  align-items: baseline;
  gap: 12px;
  min-width: 0;
}
.inbox-row .content-col .behoerde {
  font-size: 14.5px;
  font-weight: 500;
  color: var(--ds-color-text-primary);
  letter-spacing: -0.005em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.inbox-row.unread .content-col .behoerde { font-weight: 700; }
.inbox-row .content-col .brieftyp {
  font-size: 13.5px;
  color: var(--ds-color-text-secondary);
  letter-spacing: -0.005em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.inbox-row .content-col .akz {
  font-size: 12px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.005em;
  white-space: nowrap;
  justify-self: end;
}

.inbox-row .meta-col {
  display: flex; align-items: center; gap: 10px;
  white-space: nowrap;
}
.inbox-row .meta-col .auth-mark {
  color: var(--ds-color-success);
  display: inline-flex;
}
.inbox-row .meta-col .date {
  font-size: 12px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.005em;
  min-width: 48px;
  text-align: end;
}
.inbox-row.unread .meta-col .date { color: var(--ds-color-text-secondary); font-weight: 500; }

.inbox-row.done { opacity: 0.5; }
.inbox-row.done .behoerde { font-weight: 400; }

.inbox-empty {
  padding: 48px 16px;
  text-align: center;
  color: var(--ds-color-text-muted);
  font-size: 14px;
}

@media (max-width: 720px) {
  .inbox-row { grid-template-columns: 140px 1fr; gap: 12px; }
  .inbox-row .meta-col { grid-column: 2; justify-self: end; }
  .inbox-row .content-col { grid-template-columns: 1fr; gap: 2px; }
  .inbox-row .content-col .akz { justify-self: start; }
}

/* Empty / footer notes */
.inbox-foot {
  margin-top: 48px;
  padding: 18px 0;
  border-top: 1px solid var(--ds-color-border);
  font-size: 12px;
  color: var(--ds-color-text-muted);
  max-width: 80ch;
  line-height: 1.55;
}

/* ════════════════════════════════════════════════════════════════════
   LETTER READER — documentary layout
   ═══════════════════════════════════════════════════════════════════ */
.reader-back {
  background: none; border: none; padding: 0;
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--ds-color-text-muted);
  font-size: 12.5px;
  cursor: pointer;
  margin-bottom: 24px;
  white-space: nowrap;
  transition: color var(--ds-duration-press) var(--ds-ease-out-strong),
              transform var(--ds-duration-press) var(--ds-ease-out-strong);
}
.reader-back:hover { color: var(--ds-color-text-primary); transform: translateX(-2px); }

.reader-head {
  display: flex; flex-direction: column; gap: 12px;
  padding-bottom: 32px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--ds-color-border);
}
.reader-head .meta {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-size: 12.5px;
  color: var(--ds-color-text-muted);
}
.reader-head .meta .from {
  color: var(--ds-color-text-secondary);
  font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.reader-head .meta .kategorie { color: var(--ds-color-text-muted); white-space: nowrap; }
.reader-head h1 {
  margin: 0;
  font-size: 36px;
  line-height: 1.1;
  font-weight: 600;
  letter-spacing: -0.015em;
  max-width: 22ch;
}
.reader-head .akz {
  display: flex; align-items: center; gap: 16px;
  font-size: 12.5px;
  font-variant-numeric: tabular-nums;
  color: var(--ds-color-text-muted);
  margin-top: 4px;
  flex-wrap: wrap;
}
.reader-head .akz > span { white-space: nowrap; }
.reader-head .chips { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 4px; }

.reader-grid {
  display: grid;
  grid-template-columns: 1fr 1.05fr;
  gap: 56px;
  align-items: start;
}
@media (max-width: 900px) { .reader-grid { grid-template-columns: 1fr; gap: 32px; } }

.reader-section { display: flex; flex-direction: column; gap: 16px; }
.reader-section-head {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ds-color-text-muted);
  white-space: nowrap;
}
.reader-section-head svg { color: var(--ds-color-accent); }

.summary-bullets { list-style: none; padding: 0; margin: 0; counter-reset: bullet; }
.summary-bullets li {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 4px;
  padding: 14px 0;
  border-bottom: 1px solid var(--ds-color-border);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ds-color-text-primary);
}
.summary-bullets li:last-child { border-bottom: none; }
.summary-bullets li::before {
  counter-increment: bullet;
  content: counter(bullet, decimal-leading-zero);
  font-size: 10.5px;
  font-weight: 600;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
  padding-top: 5px;
}
.summary-bullets li strong { color: var(--ds-color-text-primary); font-weight: 600; }
.summary-bullets li .citation {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  color: var(--ds-color-accent);
  margin-inline-start: 6px;
  font-variant-numeric: tabular-nums;
  cursor: pointer;
  white-space: nowrap;
}

.summary-foot {
  font-size: 11.5px;
  color: var(--ds-color-text-muted);
  line-height: 1.6;
  padding-top: 14px;
  border-top: 1px solid var(--ds-color-border);
  max-width: 60ch;
}

/* Documentary brief — looks like an actual letter */
.brief-doc {
  background: var(--ds-color-surface-raised);
  border: 1px solid var(--ds-color-border);
  border-radius: 4px;
  padding: 40px 44px;
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--ds-color-text-primary);
  white-space: pre-wrap;
  position: relative;
  overflow: hidden;
  letter-spacing: -0.005em;
}
.brief-doc::before {
  content: "MOCK";
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(-22deg);
  font-size: 140px;
  font-weight: 800;
  letter-spacing: 0.12em;
  color: var(--ds-color-text-primary);
  opacity: 0.035;
  pointer-events: none;
  font-family: var(--ds-font-mono);
  z-index: 0;
}

.sticky-action-bar {
  position: sticky;
  bottom: 24px;
  z-index: 10;
  margin-top: 48px;
  padding: 14px 20px;
  background: var(--ds-color-surface);
  border: 1px solid var(--ds-color-border);
  border-radius: 12px;
  box-shadow: var(--ds-shadow-popover);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.sticky-action-bar .ctx { font-size: 13px; color: var(--ds-color-text-secondary); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.sticky-action-bar .ctas { display: flex; gap: 8px; }

/* ════════════════════════════════════════════════════════════════════
   UMZUG WIZARD
   ═══════════════════════════════════════════════════════════════════ */
.wizard-progress {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 40px;
  padding: 0 0 20px;
  border-bottom: 1px solid var(--ds-color-border);
}
.wizard-step {
  display: flex; align-items: center; gap: 10px;
  padding-inline-end: 24px;
  margin-inline-end: 24px;
  border-inline-end: 1px solid var(--ds-color-border);
  font-size: 13px;
  color: var(--ds-color-text-muted);
  white-space: nowrap;
}
.wizard-step:last-child { border-inline-end: none; margin-inline-end: 0; padding-inline-end: 0; }
.wizard-step .num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--ds-color-surface);
  border: 1px solid var(--ds-color-border-strong);
  display: inline-flex; align-items: center; justify-content: center;
  font-variant-numeric: tabular-nums;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--ds-color-text-secondary);
}
.wizard-step.active .num { background: var(--ds-color-text-primary); color: var(--ds-color-surface); border-color: transparent; }
.wizard-step.active { color: var(--ds-color-text-primary); font-weight: 600; }
.wizard-step.done .num { background: var(--ds-color-success); color: var(--ds-color-surface); border-color: transparent; }
.wizard-step.done { color: var(--ds-color-text-secondary); }

.foederalismus {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 14px 18px;
  background: var(--ds-color-info-soft);
  border-radius: 8px;
  font-size: 13px;
  color: var(--ds-color-accent);
  line-height: 1.5;
  margin-bottom: 32px;
}
.foederalismus strong { font-weight: 600; }

.cascade-block {
  padding: 24px 0 32px;
  border-bottom: 1px solid var(--ds-color-border);
}
.cascade-block:last-child { border-bottom: none; }
.cascade-block-head {
  display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
  margin-bottom: 16px;
}
.cascade-block-head h3 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.cascade-block-head h3 .blk-num {
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  font-weight: 500;
  color: var(--ds-color-text-muted);
  margin-inline-end: 10px;
}
.cascade-block-head .timing {
  font-size: 11.5px;
  color: var(--ds-color-text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.cascade-block-head .status {
  font-size: 12.5px;
  font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
}
.cascade-block-head .status.done { color: var(--ds-color-success); }
.cascade-block-head .status.active { color: var(--ds-color-accent); }

.behoerde-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--ds-color-border);
}
.behoerde-row:last-child { border-bottom: none; }
.behoerde-row .name-col { display: flex; flex-direction: column; gap: 2px; }
.behoerde-row .name {
  font-size: 14.5px;
  font-weight: 500;
  color: var(--ds-color-text-primary);
}
.behoerde-row .task {
  font-size: 12.5px;
  color: var(--ds-color-text-muted);
  line-height: 1.5;
}
.behoerde-row .kategorie {
  font-size: 10.5px;
  color: var(--ds-color-text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;
  margin-top: 2px;
}
.behoerde-row .toggle {
  width: 20px; height: 20px;
  accent-color: var(--ds-color-accent);
}

/* ════════════════════════════════════════════════════════════════════
   LANDING — persona picker
   ═══════════════════════════════════════════════════════════════════ */
.landing { min-height: 100vh; background: var(--ds-color-surface); display: flex; flex-direction: column; }
.landing-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 56px 0;
  font-size: 13px;
  color: var(--ds-color-text-muted);
}
@media (max-width: 760px) { .landing-bar { padding: 20px 24px 0; } }
.landing-bar .brand { display: flex; align-items: center; gap: 10px; color: var(--ds-color-text-primary); white-space: nowrap; }

// ─── primitives.jsx ─────────────────────────────────────────────────────
// Primitives — Button, Card, Input, Badge, FristChip, WizardProgress, etc.
// Tactile press scale, custom curves per Emil Kowalski.
// Loaded after icons.jsx; depends on Gt* icons on window.

function Button({ variant = "primary", size, disabled, onClick, children, type = "button", className = "" }) {
  const cls = `btn btn-${variant}${size ? ' btn-' + size : ''} ${className}`;
  return <button type={type} className={cls} disabled={disabled} onClick={onClick}>{children}</button>;
}

function Card({ children, className = "", raised = false, hover = false, onClick }) {
  const cls = `card${raised ? ' card-raised' : ''}${hover ? ' card-hover' : ''} ${className}`;
  return <div className={cls} onClick={onClick} role={onClick ? "button" : undefined}>{children}</div>;
}

function Input({ label, hint, type = "text", value, onChange, placeholder, tabular }) {
  return (
    <label className="stack-sm" style={{ display: "block" }}>
      {label ? <span className="input-label">{label}</span> : null}
      <input type={type} className={`input${tabular ? ' ds-tabular' : ''}`} value={value || ""} onChange={onChange} placeholder={placeholder} />
      {hint ? <span className="input-hint">{hint}</span> : null}
    </label>
  );
}

function Badge({ children, variant, className = "" }) {
  const cls = `badge${variant ? ' badge-' + variant : ''} ${className}`;
  return <span className={cls}>{children}</span>;
}

function PilotBadge() {
  return <Badge variant="pilot"><GtInfo size={11} />Pilot-Phase</Badge>;
}

function MockTag() {
  return <span className="badge badge-mock">MOCK</span>;
}

function Eyebrow({ children, accent }) {
  return <span className={`eyebrow${accent ? ' eyebrow-accent' : ''}`}>{children}</span>;
}

// FristChip — urgency-based pill
function FristChip({ daysLeft, typ = "Antwortfrist" }) {
  let tier = "tier-normal";
  let icon = <GtClock3 size={12} />;
  let label;
  if (daysLeft < 0) {
    tier = "tier-overdue";
    icon = <GtAlertTriangle size={12} />;
    label = `${typ} · ${Math.abs(daysLeft)} Tage abgelaufen`;
  } else if (daysLeft < 3) {
    tier = "tier-very-urgent";
    icon = <GtAlertTriangle size={12} />;
    label = daysLeft === 0 ? `${typ} · heute` : `${typ} · in ${daysLeft} Tagen`;
  } else if (daysLeft < 7) {
    tier = "tier-urgent";
    label = `${typ} · in ${daysLeft} Tagen`;
  } else {
    label = `${typ} · in ${daysLeft} Tagen`;
  }
  return <span className={`frist-chip ${tier}`}>{icon}<span>{label}</span></span>;
}

// Discrete disclaimer bar — sits between Topbar and main, low-pressure
function DisclaimerBar() {
  return (
    <div className="disclaimer-bar" role="note">
      <strong>Speculative Prototype</strong>
      <span className="ellipsis">· keine echte Behörde angebunden · alle Daten synthetisch</span>
      <MockTag />
    </div>
  );
}

// Page opener — editorial title with optional lede, used sparingly
function PageOpener({ eyebrow, title, lede, accent }) {
  return (
    <div className="page-opener">
      {eyebrow ? <Eyebrow accent={accent}>{eyebrow}</Eyebrow> : null}
      <h1>{title}</h1>
      {lede ? <p className="lede">{lede}</p> : null}
    </div>
  );
}

// Section mark — replaces generic <h2 className="section-title"> with editorial divider
function SectionMark({ num, label }) {
  return (
    <div className="section-mark" role="presentation">
      {num ? <span className="num">{num}</span> : null}
      <span className="label">{label}</span>
      <span className="rule" />
    </div>
  );
}

// Wizard progress — top-design tablular numerals, not pills
function WizardProgress({ step, steps }) {
  const items = steps || [
    { idx: 1, label: "Adresse & Stichtag" },
    { idx: 2, label: "Vorschau" },
    { idx: 3, label: "Autopilot" },
  ];
  return (
    <ol className="wizard-progress" aria-label="Schritte">
      {items.map((s) => {
        const isDone = step > s.idx;
        const isActive = step === s.idx;
        const cls = isActive ? "wizard-step active" : isDone ? "wizard-step done" : "wizard-step";
        return (
          <li key={s.idx} className={cls}>
            <span className="num">{isDone ? <GtCheck size={11} /> : String(s.idx).padStart(2, "0")}</span>
            <span>{s.label}</span>
          </li>
        );
      })}
    </ol>
  );
}

Object.assign(window, {
  GtButton: Button,
  GtCard: Card,
  GtInput: Input,
  GtBadge: Badge,
  GtPilotBadge: PilotBadge,
  GtMockTag: MockTag,
  GtEyebrow: Eyebrow,
  GtFristChip: FristChip,
  GtDisclaimerBar: DisclaimerBar,
  GtPageOpener: PageOpener,
  GtSectionMark: SectionMark,
  GtWizardProgress: WizardProgress,
});
  </script>

function DashboardScreen({ persona, letters, onOpenLetter, onOpenUmzug }) {
  const open = letters.filter((l) => l.status === "ungelesen");
  const urgent = open.filter((l) => l.frist && l.frist.daysLeft < 7);
  const today = new Intl.DateTimeFormat("de-DE", { weekday: "long", day: "numeric", month: "long" }).format(new Date());
  const firstName = persona.name.split(" ")[0];

  // Editorial summary phrasing — count-aware
  const summary = (() => {
    if (urgent.length > 0) return <p><strong>{urgent.length} {urgent.length === 1 ? "Brief" : "Briefe"}</strong> mit Frist unter sieben Tagen. Der Rest hat Zeit.</p>;
    if (open.length > 0) return <p><strong>{open.length} ungelesene {open.length === 1 ? "Mitteilung" : "Mitteilungen"}</strong>, keine dringenden Fristen.</p>;
    return <p>Nichts Dringendes. <strong>Sie können sich anderem widmen.</strong></p>;
  })();

  return (
    <React.Fragment>
      <section className="dash-hero" aria-labelledby="greet">
        <div className="greeting">
          <span className="date">{today}</span>
          <h1 id="greet" className="ds-jumbo">
            Guten Tag,<br/>
            <span className="name">{firstName}.</span>
          </h1>
        </div>
        <div className="summary">{summary}</div>
      </section>

      <div className="dash-stats">
        <div className="dash-stat">

  <script type="text/babel" data-presets="react" data-source="screen-posteingang.jsx">
// ─── screen-posteingang.jsx ─────────────────────────────────────────────────────
// Posteingang — Gmail Priority Inbox: sections by urgency, single-line rows,
// no AI preview, no checkbox-like dots. Frist chip is the primary visual element.

function PosteingangScreen({ persona, letters, openLetterId, onOpenLetter, onClose }) {
  const [search, setSearch] = React.useState("");

  if (openLetterId) {
    const letter = letters.find((l) => l.id === openLetterId);
    if (letter) return <LetterReader letter={letter} onClose={onClose} />;
  }

  // Apply search filter
  let visible = letters;
  if (search.length >= 2) {
    const q = search.toLowerCase();
    visible = visible.filter((l) => {
      const hay = (l.aktenzeichen + " " + l.brieftyp + " " + window.GtData.BEHOERDEN[l.absender].name).toLowerCase();
      return hay.includes(q);
    });
  }

  // Bucket by urgency (Gmail Priority Inbox pattern)
  const buckets = {
    heute:    [],   // overdue + frist today
    woche:    [],   // frist < 7d
    monat:    [],   // frist < 30d
    ohneFrist:[],   // unread, no frist
    erledigt: [],
  };
  for (const l of visible) {
    if (l.status === "erledigt") { buckets.erledigt.push(l); continue; }
    if (l.frist) {
      const d = l.frist.daysLeft;
      if (d < 0 || d === 0) buckets.heute.push(l);
      else if (d < 7) buckets.woche.push(l);
      else if (d < 30) buckets.monat.push(l);
      else buckets.ohneFrist.push(l);
    } else {
      buckets.ohneFrist.push(l);
    }
  }
  // Sort each bucket: ungelesen first, then by date desc
  const sortBucket = (arr) => arr.sort((a, b) => {
    const ua = a.status === "ungelesen" ? 0 : 1;
    const ub = b.status === "ungelesen" ? 0 : 1;
    if (ua !== ub) return ua - ub;
    return b.empfangen.localeCompare(a.empfangen);
  });
  Object.keys(buckets).forEach((k) => sortBucket(buckets[k]));

  const totalActive = buckets.heute.length + buckets.woche.length + buckets.monat.length + buckets.ohneFrist.length;
  const heuteCount = buckets.heute.length;

  return (
    <React.Fragment>
      <header className="inbox-header">
        <div>
          <h1>Posteingang</h1>
          <p className="stats">
            {totalActive === 0 ? "Keine offenen Briefe" :
             `${totalActive} ${totalActive === 1 ? "offener Brief" : "offene Briefe"}`}
            {heuteCount > 0 ? <React.Fragment><span className="sep"> · </span><span className="urgent-stat">{heuteCount} heute fällig</span></React.Fragment> : null}
          </p>
        </div>
        <div className="inbox-search">
          <GtSearch size={14} />
          <input
            type="search" value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Suchen…"
          />
        </div>
      </header>

      <div className="inbox-list">
        {buckets.heute.length > 0 && (
          <InboxSection tone="danger" label="Heute fällig" count={buckets.heute.length} letters={buckets.heute} onOpen={onOpenLetter} />
        )}
        {buckets.woche.length > 0 && (
          <InboxSection tone="warning" label="Diese Woche" count={buckets.woche.length} letters={buckets.woche} onOpen={onOpenLetter} />
        )}
        {buckets.monat.length > 0 && (
          <InboxSection tone="neutral" label="Diesen Monat" count={buckets.monat.length} letters={buckets.monat} onOpen={onOpenLetter} />
        )}
        {buckets.ohneFrist.length > 0 && (
          <InboxSection tone="neutral" label="Ohne Frist" count={buckets.ohneFrist.length} letters={buckets.ohneFrist} onOpen={onOpenLetter} />
        )}
        {buckets.erledigt.length > 0 && (
          <InboxSection tone="muted" label="Erledigt" count={buckets.erledigt.length} letters={buckets.erledigt} onOpen={onOpenLetter} collapsible defaultOpen={totalActive === 0} />
        )}
        {visible.length === 0 && (
          <div className="inbox-empty">
            {search.length >= 2 ? "Keine Briefe entsprechen Ihrer Suche." : "Posteingang ist leer."}
          </div>
        )}
      </div>
    </React.Fragment>
  );
}

// ─── InboxSection — priority section with optional collapsible ───
function InboxSection({ tone, label, count, letters, onOpen, collapsible, defaultOpen }) {
  const [open, setOpen] = React.useState(defaultOpen !== false);
  const isCollapsible = !!collapsible;
  return (
    <section className={`inbox-section tone-${tone}`}>
      <header
        className="inbox-section-head"
        onClick={isCollapsible ? () => setOpen(!open) : undefined}
        role={isCollapsible ? "button" : undefined}
        tabIndex={isCollapsible ? 0 : undefined}
        aria-expanded={isCollapsible ? open : undefined}
        onKeyDown={(e) => { if (isCollapsible && (e.key === "Enter" || e.key === " ")) { e.preventDefault(); setOpen(!open); } }}
      >
        {isCollapsible ? (
          <span className="caret" aria-hidden="true" style={{ display: "inline-flex", transform: open ? "rotate(90deg)" : "none", transition: "transform var(--ds-duration-press) var(--ds-ease-out-strong)" }}>
            <GtChevronRight size={12} />
          </span>
        ) : null}
        <span className="label">{label}</span>
        <span className="count">{count}</span>
      </header>
      {(!isCollapsible || open) && (
        <div className="inbox-section-body">
          {letters.map((l) => <InboxRow key={l.id} letter={l} onOpen={() => onOpen(l.id)} />)}
        </div>
      )}
    </section>
  );
}

// ─── InboxRow — single line, Frist chip primary, no AI preview, no dot ───
function InboxRow({ letter, onOpen }) {
  const absender = window.GtData.BEHOERDEN[letter.absender];
  const isUnread = letter.status === "ungelesen";
  const isErledigt = letter.status === "erledigt";

  return (
    <article
      role="button" tabIndex={0}
      className={`inbox-row${isUnread ? " unread" : ""}${isErledigt ? " done" : ""}`}
      onClick={onOpen}
      onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onOpen(); } }}
    >
      {/* Frist chip OR placeholder dash — primary visual anchor */}
      <div className="frist-col">
        {letter.frist
          ? <GtFristChip daysLeft={letter.frist.daysLeft} typ={letter.frist.typ} />
          : <span className="no-frist">—</span>}
      </div>

      <div className="content-col">
        <span className="behoerde">{absender.name}</span>
        <span className="brieftyp">{letter.brieftyp}</span>
        <span className="akz">{letter.aktenzeichen}</span>
      </div>

      <div className="meta-col">
        {letter.auth === "EUDI-versiegelt"
          ? <span className="auth-mark" title="EUDI-versiegelt"><GtShieldCheck size={12} /></span>
          : null}
        <span className="date">{formatRelativeDate(letter.empfangen)}</span>
      </div>
    </article>
  );
}

function formatRelativeDate(iso) {
  const d = new Date(iso + "T12:00:00");
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return "Heute";
  if (diffDays === 1) return "Gestern";
  if (diffDays < 7) return new Intl.DateTimeFormat("de-DE", { weekday: "short" }).format(d);
  if (d.getFullYear() === now.getFullYear()) return new Intl.DateTimeFormat("de-DE", { day: "numeric", month: "short" }).format(d);
  return new Intl.DateTimeFormat("de-DE", { day: "numeric", month: "short", year: "2-digit" }).format(d);
}

// ─── LetterReader (unchanged) ──────────────────────────────────────
function LetterReader({ letter, onClose }) {
  const absender = window.GtData.BEHOERDEN[letter.absender];
  const datum = letter.empfangen.split("-").reverse().join(".");

  const renderSummary = (text, idx) => {
    const parts = [];
    let i = 0; let k = 0;
    const re = /(\*\*[^*]+\*\*|\{\{NORM:[^}]+\}\})/g;
    let m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > i) parts.push(text.slice(i, m.index));
      const tok = m[0];
      if (tok.startsWith("**")) parts.push(<strong key={`s-${idx}-${k++}`}>{tok.slice(2, -2)}</strong>);
      else parts.push(<span key={`n-${idx}-${k++}`} className="norm-cite">{tok.slice(7, -2)}</span>);
      i = m.index + tok.length;
    }
    if (i < text.length) parts.push(text.slice(i));
    return parts;
  };

  return (
    <React.Fragment>
      <button className="reader-back" onClick={onClose}>
        <GtArrowLeft size={14} />Zurück zum Posteingang
      </button>

      <header className="reader-head">
        <div className="meta">
          <span className="from">{absender.name}</span>
          <span className="kategorie">{absender.kategorie}</span>
        </div>
        <h1>{letter.brieftyp}</h1>
        <div className="akz">
          <span>Aktenzeichen <strong style={{ color: "var(--ds-color-text-primary)", fontWeight: 500 }}>{letter.aktenzeichen}</strong></span>
          <span>·</span>
          <span>Empfangen am {datum}</span>
        </div>
        <div className="chips">
          {letter.frist ? <GtFristChip daysLeft={letter.frist.daysLeft} typ={letter.frist.typ} /> : null}
          {letter.auth === "EUDI-versiegelt"
            ? <GtBadge variant="success"><GtShieldCheck size={11} />EUDI-versiegelt</GtBadge>
            : <GtBadge><GtMail size={11} />{letter.auth}</GtBadge>}
        </div>
      </header>

      <div className="reader-grid">
        <section className="reader-section" aria-labelledby="summary-h">
          <div className="reader-section-head" id="summary-h">
            <GtSparkles size={12} />
            <span>KI-Zusammenfassung</span>
          </div>
          <ol className="summary-bullets">
            {letter.summary.map((b, idx) => (
              <li key={idx}>
                <span>{renderSummary(b, idx)}&nbsp;<span className="citation">[{String(idx + 1).padStart(2, "0")}]</span></span>
              </li>
            ))}
          </ol>
          <p className="summary-foot">
            Diese Zusammenfassung wurde von einem KI-Modell erzeugt. Maßgeblich ist der Bescheid im Original (rechts).
            Zitate <span className="norm-cite">§</span> verweisen auf <span style={{ fontFamily: "var(--ds-font-mono)" }}>gesetze-im-internet.de</span>.
          </p>
        </section>

        <section className="reader-section" aria-labelledby="original-h">
          <div className="reader-section-head" id="original-h">
            <GtFileText size={12} />
            <span>Original-Brief</span>
          </div>
          <div className="brief-doc">{letter.original}</div>
        </section>
      </div>

      <div className="sticky-action-bar">
        <div className="ctx">
          {letter.frist ? <GtFristChip daysLeft={letter.frist.daysLeft} typ={letter.frist.typ} /> : null}
          <span>{letter.frist ? `Frist endet am ${letter.frist.datum}` : "Keine Frist"}</span>
        </div>
        <div className="ctas">
          <GtButton variant="outline" size="sm">Frist in Kalender</GtButton>
          <GtButton variant="accent">Antwort verfassen<GtArrowRight size={14} /></GtButton>
        </div>
      </div>
    </React.Fragment>
  );
}

Object.assign(window, { GtPosteingangScreen: PosteingangScreen, GtLetterReader: LetterReader, GtInboxRow: InboxRow, GtInboxSection: InboxSection });
  </script>
